<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semântica</title>
</head>
<body>
    <h1>Testando tags atuais que o foco é semântica.</h1>
    <p><em>Olá</em></p>
    <p><strong>Opa</strong></p>
    <p>Eu moro na rua <address>Hermínio Ferreira Bacelar, 19</address></p>
    <p><mark>Opa, eu sou héterossexual</mark></p>
    <small>Texto pequeno</small>
    <p><del>Texto que deve ser ignorado</del></p>
    <p><ins>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolore, molestiae!</ins></p>
    <p>x<sup>2</sup></p>
    <p>h<sub>2</sub>o</p>
    
</body>
</html>
