<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias</title>
</head>
<body>
    <h1>Imagens dinâmicas</h1>
    <p>Devo tentar abrir esse arquivo em qualquer dispositivo</p>
    <picture>
        <source media="(max-width: 750px)" srcset="Imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="Imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="">
    </picture>

    <h1>Aúdio no HTML5</h1>
    <p>Para se reproduzir aúdio eu acho que é assim</p>
    <audio preload="metadata" controls autoplay>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <p>Seu navegador não suporta o audio 😞 <br>
        pode baixar o arquivo aqui <a href="midia/guanacast-33.mp3" download="podcast.mp3" type="audio/mpeg">Clique aqui para download</a></p>
    </audio>

</html>
